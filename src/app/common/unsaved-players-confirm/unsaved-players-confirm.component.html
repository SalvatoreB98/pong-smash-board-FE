<div class="are-you-sure-modal">
    <h2>Attenzione!</h2>
    <div>
        <p class="mt-5">Ti sei dimenticato di aggiungere i seguenti giocatori, aggiungerli o chiudere annullando?</p>
        <ul style="text-align: left; margin: 1em 0; max-height: 200px; overflow-y: auto;">
            <li *ngFor="let p of players"><strong>{{ p.nickname }}</strong> <span *ngIf="p.name || p.surname">({{ p.name }} {{ p.surname }})</span></li>
        </ul>
        <div class="d-flex justify-content-between mt-5">
            <button type="button" class="cancel contrast" (click)="cancelled.emit(true)">Annulla e chiudi</button>
            <button type="button" class="yes bg-secondary" (click)="confirmed.emit(true)">Aggiungi</button>
        </div>
    </div>
</div>
