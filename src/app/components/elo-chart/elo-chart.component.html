<div class="elo-chart-container" *ngIf="hasData">
  <div class="header">
    <h3>{{ 'elo_rating_title' | translate }}</h3>
    <p>{{ 'elo_chart_subtitle' | translate }}
      <span *ngFor="let p of players; let last = last">
        {{ p.nickname | uppercase }}<span *ngIf="!last"> {{ 'vs' | translate }} </span>
      </span>
    </p>
  </div>

  <apx-chart
    [series]="chartOptions.series!"
    [chart]="chartOptions.chart!"
    [xaxis]="chartOptions.xaxis!"
    [yaxis]="chartOptions.yaxis!"
    [stroke]="chartOptions.stroke!"
    [colors]="chartOptions.colors!"
    [dataLabels]="chartOptions.dataLabels!"
    [grid]="chartOptions.grid!"
    [tooltip]="chartOptions.tooltip!"
    [markers]="chartOptions.markers!"
  ></apx-chart>

  <div class="summary-cards">
    <div class="card" *ngFor="let p of cardPlayers">
      <div class="player-name">{{ p.nickname | uppercase }}</div>
      <div class="rating" [class]="'color-' + p.colorIndex">{{ p.rating }}</div>
      <div class="label">{{ 'current_elo' | translate }}</div>
    </div>
  </div>
</div>
<div class="elo-chart-container" *ngIf="!hasData">
    <div class="header">
      <h3>{{ 'elo_rating_title' | translate }}</h3>
      <p>{{ 'elo_chart_no_data' | translate }}</p>
    </div>
</div>
